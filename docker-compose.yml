version: '3'
services:
  crud-api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_USER_DB=users
      - JWT_SECRET_KEY=<um_valor_randomico>
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
    networks:
      - crud_network

  mongodb:
    image: mongo
    ports:
      - "27017:27017"
    networks:
      - crud_network

networks:
  crud_network: